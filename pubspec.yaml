name: landlord_os
description: "LandlordOS — Property portfolio management for landlords."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Code generation annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Local storage
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.7.0

  # Charts
  fl_chart: ^0.70.2

  # Environment
  flutter_dotenv: ^5.2.1

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # PDF
  pdf: ^3.11.2
  printing: ^5.13.4

  # Fonts
  google_fonts: ^6.2.1

  # Formatting
  intl: ^0.19.0

  # Push notifications
  firebase_messaging: ^15.1.6

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.2

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
